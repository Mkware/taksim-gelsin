name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (tsc + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # vitest 4.x en az Node 20 istiyor (node:util styleText — Node 18'de yok).
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      # tests/ altındaki entegrasyon testleri testcontainers ile gerçek
      # Postgres+PostGIS ayağa kaldırıyor — ubuntu-latest runner'da Docker
      # zaten hazır geliyor, ek kurulum gerekmiyor.
      - run: npm test

  mobile:
    name: Mobile (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Yerel geliştirme sürümüyle eşleşecek şekilde sabit — kod değişmeden
          # yalnızca upstream Flutter sürümü değiştiği için CI kırılmasın diye.
          # Kasıtlı olarak yükseltilirken mobile/README veya CLAUDE.md'ye not düşün.
          flutter-version: '3.41.8'
          channel: stable
      - run: flutter pub get
      # Faz 0: yalnızca gerçek (error seviyeli) sorunlarda kırmızı yansın.
      # Mevcut info/warning borcu (withOpacity deprecation, birkaç kullanılmayan
      # özel metod) fazlı sertleştirme planına göre sonraki fazlarda temizlenip
      # bu bayraklar kaldırılacak — bkz. docs/KOD_ANALIZI_VE_YOL_HARITASI_2026-07-12.md
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test
