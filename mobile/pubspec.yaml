name: taksim_gelsin
description: Kırıkkale Taksi Çağırma Uygulaması
publish_to: 'none'
version: 1.0.2+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.10

  # Navigation
  go_router: ^14.2.0

  # HTTP & API
  dio: ^5.4.3+1
  
  # WebSocket (Socket.io)
  socket_io_client: ^2.0.3+1

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.6
  lucide_icons_flutter: ^3.1.15
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Ses (yolculuk bildirimi — sistem bildirim tonu)
  flutter_ringtone_player: ^4.0.0+4

  # Harici uygulamalar (Google Haritalar yön tarifi)
  url_launcher: ^6.3.1

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  share_plus: ^12.0.2

dependency_overrides:
  # path_provider_foundation 2.6+ uses package:objective_c (FFI). On iOS Simulator
  # (esp. iOS 26 betası) DOBJC_initializeApi / objective_c.framework often fails to load.
  # 2.5.1 keeps the classic PathProviderPlugin implementation without objective_c.
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/taksim_gelsin.wav

# Uygulama simgesi — `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/brand_logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/brand_logo.png
  remove_alpha_ios: true
  background_ios: "#000000"
